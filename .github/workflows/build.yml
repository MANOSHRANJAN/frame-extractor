name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Obfuscate Source Code
      continue-on-error: true
      run: |
        npx javascript-obfuscator ./src/main.js --output ./src/main.js --compact true --control-flow-flattening true
        npx javascript-obfuscator ./src/renderer.js --output ./src/renderer.js --compact true --control-flow-flattening true
        npx javascript-obfuscator ./src/preload.js --output ./src/preload.js --compact true --control-flow-flattening true

    - name: Build Electron App (macOS)
      if: matrix.os == 'macos-latest'
      run: npx electron-builder --mac --publish never
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Electron App (Windows)
      if: matrix.os == 'windows-latest'
      run: npx electron-builder --win --publish never
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: List build output
      run: ls -la dist/ || dir dist\
      continue-on-error: true

    - name: Release to GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*.dmg
          dist/*.exe
          dist/*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
